[build]
publish = "public"
command = "bun run build && hugo --gc --minify"

[build.environment]
BUN_VERSION = "1.3.10"
HUGO_VERSION = "0.145.0"
GO_VERSION = "1.23.5"

[context.production.environment]
HUGO_ENV = "production"
HUGO_ENABLEGITINFO = "true"
GIT_LFS_ENABLED = "true"

[context.split1]
command = "bun run build && hugo --gc --minify --enableGitInfo"

[context.split1.environment]
HUGO_ENV = "production"

[context.deploy-preview]
command = "bun run build && hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
command = "bun run build && hugo --gc --minify -b $DEPLOY_PRIME_URL"

[context.next.environment]
HUGO_ENABLEGITINFO = "true"

[[headers]]
for = "/*"
[headers.values]
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[redirects]]
from = "/blog/:year/:month/:day/:slug"
to = "/posts/:slug"
status = 301
force = true
